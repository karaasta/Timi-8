<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tími 8</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="script.js"></script>
  </head>
  <div>
    <body>
      <h1>Javascript 101</h1>
      <div class="card">
        <h2>Stimplaðu inn nafnið þitt:</h2>
        <input id="nameInput" type="text" placeholder="Nafnið þitt hér..." />
        <button onclick="sayHello()">Birta halló + nafn!</button>
        <div class="output" id="nameOutput">Niðurstaðan birtist hér...</div>
      </div>
      <div class="card">
        <h2>Stimplaðu inn aldurinn þinn:</h2>
        <input id="ageInput" type="number" placeholder="Aldurinn þinn hér..." />
        <button onclick="checkAge()">Birta hvort fullorðinn eða barn</button>
        <div class="output" id="ageOutput">Niðurstaðan birtist hér...</div>
      </div>
      <div class="card">
        <h2>Reiknivél</h2>
        <input id="num1" type="number" placeholder="Tala 1..." />
        <select id="operator">
          <option value="+">+</option>
          <option value="-">-</option>
        </select>
        <input id="num2" type="number" placeholder="Tala 2..." />
        <button onclick="calculate()">Reikna</button>
        <div class="output" id="calcOutput">Niðurstaðan birtist hér...</div>
      </div>
    </body>
  </div>
</html>
